spring.application.name=transaction-system
server.port=8084

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=${JPA_SHOW_SQL}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS}

welcome-bonus.amount=5000.00
welcome-bonus.system-user-email=system@transaction.local
welcome-bonus.system-user-name=System
welcome-bonus.system-user-surname=Treasury
welcome-bonus.system-user-password=${TREASURY_ACCOUNT_PASSWORD}

debug=true
